<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感官指挥官·AI 实验室 汪！</title>
    <style>
        :root { --bg: #050507; --purple: #a855f7; --blue: #3b82f6; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .device-card { background: linear-gradient(145deg, #1a1a1e, #111114); border-radius: 24px; padding: 18px; width: 95%; max-width: 480px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 15px; }
        
        /* AI 问答弹窗汪 */
        #ai-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .ai-box { background: #1e1e26; padding: 30px; border-radius: 30px; border: 2px solid var(--purple); width: 80%; max-width: 400px; text-align: center; }
        
        .param-row { margin: 12px 0; }
        .label-row { display: flex; justify-content: space-between; font-size: 13px; color: #94a3b8; }
        .btn { border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-act { padding: 12px; background: var(--purple); flex: 1; margin: 5px; }
        .btn-mode { padding: 10px; background: #334155; margin: 5px; font-size: 12px; border: 1px solid transparent; }
        .btn-mode.active { border-color: var(--purple); background: rgba(168, 85, 247, 0.2); }
        .btn-stop { background: var(--red); width: 100%; height: 60px; margin-top: 20px; font-size: 20px; }
        .pressure-display { font-size: 56px; font-weight: 900; color: var(--blue); }
    </style>
</head>
<body>
    <!-- AI 问答汪 -->
    <div id="ai-overlay">
        <div class="ai-box">
            <h2 style="color: var(--purple);">汪！我是香喏汪！🐾</h2>
            <p id="ai-question">主人，这是您第一次光临我的感官实验室吗？</p>
            <div id="ai-options">
                <button class="btn btn-act" onclick="aiAnswer('new')">是的，请温柔点汪</button>
                <button class="btn btn-act" style="background: var(--blue);" onclick="aiAnswer('pro')">不是，我是老司机汪</button>
            </div>
        </div>
    </div>

    <h3 id="app-title" style="color: var(--purple); margin: 10px 0;">感官实验室·AI 监控中 汪！🧪</h3>

    <!-- 1. 趣味预设模式汪 -->
    <div class="device-card">
        <div class="label-row"><span>趣味剧本选择汪</span></div>
        <div style="display: flex; flex-wrap: wrap;">
            <button class="btn btn-mode" id="mode-normal" onclick="setPlayMode('normal')">手动实验室</button>
            <button class="btn btn-mode" id="mode-tide" onclick="setPlayMode('tide')">心跳潮汐🌊</button>
            <button class="btn btn-mode" id="mode-chaos" onclick="setPlayMode('chaos')">赛博乱斗🎰</button>
        </div>
    </div>

    <!-- 2. 核心状态与压力汪 -->
    <div class="device-card" style="border-top: 3px solid var(--blue);">
        <div style="display: flex; align-items: center; justify-content: space-around;">
            <div class="pressure-display" id="pressure">0</div>
            <div style="font-size: 12px; color: #64748b;">实时压力 kPa<br>禁断线: <input type="number" id="threshold" value="80" style="width:40px; color:white; background:none; border:none; border-bottom:1px solid var(--purple); text-align:center;"></div>
        </div>
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <button class="btn btn-act" onclick="connect('wonder')">配对援器</button>
            <button class="btn btn-act" onclick="connect('coyote')">配对郊狼</button>
            <button class="btn btn-act" onclick="connect('kiss')">配对震动</button>
        </div>
    </div>

    <!-- 3. 实时打断开关汪 -->
    <div class="device-card" id="lock-card" style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red);">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <b id="lock-status-text" style="color: var(--red);">禁断模式：禁止高潮汪！</b>
            <input type="checkbox" id="exp-lock" checked style="width: 24px; height: 24px;">
        </div>
    </div>

    <button class="btn btn-stop" onclick="location.reload()">紧急停止 & 格式化证据汪！🛑</button>

    <script>
        let chars = { wonder: null, coyote: null, kiss: null };
        let experience = 'new';
        let currentMode = 'normal';
        let timer = null;

        // 1. AI 问答逻辑汪
        function aiAnswer(level) {
            experience = level;
            document.getElementById('ai-overlay').style.display = 'none';
            if (level === 'new') {
                alert("香喏收到！我会温柔调教主人的，最大强度已为您限制在安全范围汪！🐾");
                document.getElementById('threshold').value = 60; // 新手红线低一点汪
            } else {
                alert("嘿嘿，主人既然是老手，那香喏就要开启‘狂暴模式’咯汪！😈");
            }
        }

        // 2. 趣味模式逻辑汪
        function setPlayMode(mode) {
            currentMode = mode;
            clearInterval(timer);
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
            
            if (mode === 'tide') {
                let up = true; let val = 0;
                timer = setInterval(() => {
                    val = up ? val + 5 : val - 5;
                    if (val >= 60 || val <= 0) up = !up;
                    applyIntensity(val);
                }, 1000);
            } else if (mode === 'chaos') {
                timer = setInterval(() => {
                    let r = Math.random() * 80;
                    applyIntensity(r);
                    if(Math.random() > 0.8) islandCmd(0xA3, 0); // 随机喷水汪！
                }, 3000);
            }
        }

        function applyIntensity(v) {
            if (experience === 'new') v = v * 0.5; // 新手减半汪
            if (chars.coyote) coyoteSend(v, 100);
            if (chars.kiss) kissSend(v);
        }

        // 3. 蓝牙与协议核心汪 (复用之前的专家版代码并优化)
        async function connect(type) {
            // ... (连接逻辑同专家版，保留 UUID 汪)
            alert("正在连接 " + type + " 汪！请在浏览器弹窗选择...");
            // 此处省略重复的 GATT 连接代码以节省篇幅，逻辑与上版一致汪
        }

        async function coyoteSend(i, f) {
            if (!chars.coyote) return;
            let cmd = new Uint8Array(20).fill(0);
            cmd[0] = 0xB0; cmd[1] = 0x33; cmd[2] = i; 
            for(let x=4; x<8; x++) cmd[x] = f;
            await chars.coyote.writeValue(cmd);
        }

        async function islandCmd(c, d) { if(chars.wonder) await chars.wonder.writeValue(new Uint8Array([0xFF, c, d])); }
        // ... (其他协议函数汪)
    </script>
</body>
</html>
