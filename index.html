<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WONDER NEXUS v125 - 终极实战日志版</title>
    <!-- 远控引擎汪 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050508; --card: #12121a; --purple: #a855f7; --blue: #3b82f6; --red: #ff2d55; --green: #10b981; --gray: #64748b; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; user-select: none; overflow-x: hidden; }
        
        header { position: sticky; top: 0; background: rgba(5,5,8,0.9); backdrop-filter: blur(15px); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid #333; }
        .st-dot { width: 8px; height: 8px; border-radius: 50%; background: #222; margin-left: 4px; transition: 0.5s; }
        .st-on { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .p-badge { font-family: monospace; font-size: 22px; color: var(--blue); font-weight: 900; }

        .content { padding: 12px; max-width: 500px; margin: 0 auto; min-height: 80vh; }
        .tab-view { display: none; animation: fadeIn 0.3s ease; }
        .tab-view.active { display: block; }
        
        /* 🚨 重点：显眼的日志窗样式汪 */
        .debug-window { background: #000; border: 2px solid var(--green); border-radius: 15px; padding: 12px; height: 100px; overflow-y: auto; font-family: monospace; font-size: 11px; color: var(--green); margin-bottom: 15px; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .log-entry { margin-bottom: 4px; border-left: 2px solid var(--green); padding-left: 6px; }

        .pro-card { background: var(--card); border-radius: 28px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .btn-hex { background: #2d2d39; border: none; color: white; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.1s; font-size: 13px; }
        .btn-hex:active { transform: scale(0.9); background: var(--purple); }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        input[type=range] { width: 100%; height: 6px; accent-color: var(--purple); margin: 10px 0; background: #333; border-radius: 10px; appearance: none; }
        input[type=number] { background: #1a1a24; border: 1px solid var(--purple); color: var(--green); padding: 8px; border-radius: 8px; width: 60px; text-align: center; font-size: 18px; }
        .pressure-hero { font-size: 64px; font-weight: 900; color: var(--blue); text-align: center; }
        
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0a0a0f; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 100; }
        .nav-item { color: #64748b; font-size: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--purple); font-weight: bold; }
        .cmd-box { width: 100%; background: #1a1a24; border: 2px solid var(--purple); color: white; padding: 15px; border-radius: 15px; font-size: 16px; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 10px; font-weight: 900;">NEXUS MASTER v125</div>
        <div class="p-badge" id="head-p">00 kPa</div>
        <div style="display:flex;"><span id="st-w" class="st-dot"></span><span id="st-c" class="st-dot"></span><span id="st-k" class="st-dot"></span></div>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; border-radius:8px; padding:5px 10px; font-size:11px;">切断</button>
    </header>

    <div class="content">
        <!-- 📡 实时实战日志汪！就在这里汪！ -->
        <div class="debug-window" id="debug-log">
            <div class="log-entry">香喏已准备就绪汪！请开启配对汪...🐾</div>
        </div>

        <!-- 1. 手动大师页汪 -->
        <div id="view-manual" class="tab-view active">
            <div class="pro-card">
                <b>⚡ 郊狼 A/B 独立指挥塔</b>
                <div style="margin-top:10px;">
                    <div style="display:flex; justify-content:space-between; font-size:12px;"><span>A 通道</span> <b class="val-hl" id="v-ca">0</b></div>
                    <div class="grid-4">
                        <button class="btn-hex" onclick="cAd('a',-10)">-10</button><button class="btn-hex" onclick="cAd('a',-1)">-1</button>
                        <button class="btn-hex" onclick="cAd('a',1)">+1</button><button class="btn-hex" onclick="cAd('a',10)">+10</button>
                    </div>
                </div>
                <div style="margin-top:15px;">
                    <div style="display:flex; justify-content:space-between; font-size:12px;"><span>B 通道</span> <b class="val-hl" id="v-cb">0</b></div>
                    <div class="grid-4">
                        <button class="btn-hex" onclick="cAd('b',-10)">-10</button><button class="btn-hex" onclick="cAd('b',-1)">-1</button>
                        <button class="btn-hex" onclick="cAd('b',1)">+1</button><button class="btn-hex" onclick="cAd('b',10)">+10</button>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px; font-size:11px;">
                    <div>频率: <span id="txt-cf">100</span>Hz<input type="range" id="sl-cf" min="10" max="240" value="100" oninput="cSyUI()"></div>
                    <div>脉宽: <span id="txt-cw">50</span>%<input type="range" id="sl-cw" min="0" max="100" value="50" oninput="cSyUI()"></div>
                </div>
            </div>

            <div class="pro-card" style="border-left: 4px solid var(--green);">
                <b>🌪️ 迷路 Lost 暴力双核 (吸吮/震动)</b>
                <div style="margin-top:10px;">
                    <div style="display:flex; justify-content:space-between;"><small>🌪️ 吸吮诱导</small> <b id="v-ks" style="color:var(--green)">0%</b></div>
                    <input type="range" id="sl-ks" max="255" value="0" oninput="kSy('suck')">
                    <div style="display:flex; justify-content:space-between;"><small>📳 震动频率</small> <b id="v-kv" style="color:var(--green)">0%</b></div>
                    <input type="range" id="sl-kv" max="255" value="0" oninput="kSy('vibe')">
                </div>
                <button class="btn-hex" style="width:100%; background:var(--green); margin-top:10px;" onclick="kSy('test')">🚀 暴力唤醒测试 (震一下汪！)</button>
            </div>

            <div class="pro-card" style="border-left: 4px solid var(--blue);">
                <div style="display:flex; justify-content:space-between; align-items:center;"><b>🎈 援器控制</b> <b id="p-mini" style="color:var(--blue)">0 kPa</b></div>
                <div class="grid-2" style="margin-top:10px;">
                    <button class="btn-hex" style="background:var(--blue); height:50px;" onclick="isla(0xA2,0)">点充汪</button>
                    <button class="btn-hex" style="height:50px;" id="btn-def" onclick="isla(0xA5,0)">点放汪</button>
                </div>
                <div style="font-size:11px; color:grey; margin-top:10px; text-align:center;">
                    累计充气: <b id="inf-cnt" style="color:var(--green)">0</b> 次 | 
                    <span onclick="isla(0xA3,2)" style="color:var(--blue); text-decoration:underline;">水泵开关</span>
                </div>
            </div>
        </div>

        <!-- 🧪 2. 实验大厅汪 -->
        <div id="view-lab" class="tab-view">
            <div class="pro-card" style="border: 2px solid var(--red); text-align:center;">
                <div class="pressure-hero" id="p-lab">0</div>
                <div class="timer-val" id="l-timer">READY</div>
            </div>
            <div class="pro-card">
                <b>⚙️ 实验设定汪</b>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;"><span>压力红线:</span> <input type="number" id="lab-th" value="85"></div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;"><small>轮盘中奖率:</small> <b id="v-prob" style="color:var(--green)">50%</b></div>
                <input type="range" id="sl-prob" value="50" oninput="document.getElementById('v-prob').innerText=this.value+'%'">
            </div>
            <button class="btn-hex" style="width:100%; background:var(--purple); margin-bottom:8px; height:50px;" onclick="startL('covenant')">⛓️ 圣约协议汪 (限时自定)</button>
            <button class="btn-hex" style="width:100%; background:var(--green); margin-bottom:8px; height:50px;" onclick="startL('counter')">🔢 计数任务汪</button>
            <button class="btn-hex" style="width:100%; background:var(--blue);" onclick="startL('roulette')">🎰 赛博轮盘赌汪</button>
        </div>

        <!-- 🌐 3. 远控与口令汪 -->
        <div id="view-remote" class="tab-view">
            <div class="pro-card" style="text-align:center; border: 2px solid var(--green);">
                <h3>🌐 远程控制授权汪</h3>
                <button class="btn-hex" style="background:var(--purple); width:100%;" onclick="initM()">生成授权码汪</button>
                <div class="val-hl" style="font-size:36px; margin:15px 0; color:var(--green);" id="my-id">------</div>
                <input type="text" id="target-id" class="cmd-box" style="text-align:center;" placeholder="填入对方授权码汪...">
                <button class="btn-hex" style="background:var(--blue); width:100%; margin-top:10px;" onclick="initS()">开始远程接入汪</button>
            </div>
            <div class="pro-card">
                <b>🛸 指挥官口令</b>
                <input type="text" id="cmd-in" class="cmd-box" placeholder="例如：充气、电击+10汪..." onkeypress="handleCmd(event)">
            </div>
        </div>

        <!-- 🔗 4. 连接页汪 -->
        <div id="view-conn" class="tab-view">
            <div class="pro-card">
                <h3>🔗 宝贝配对中心</h3>
                <button class="btn-hex" style="width:100%; margin-bottom:10px; background:var(--blue);" onclick="bt('wonder')">连接：援器汪</button>
                <button class="btn-hex" style="width:100%; margin-bottom:10px; background:var(--purple);" onclick="bt('coyote')">连接：郊狼 3.0</button>
                <button class="btn-hex" style="width:100%; background:var(--green);" onclick="bt('kiss')">连接：迷路 Lost 专项</button>
            </div>
        </div>

    </div>

    <nav>
        <div class="nav-item active" onclick="tab('manual')">🕹️手动</div>
        <div class="nav-item" onclick="tab('lab')">🧪实验</div>
        <div class="nav-item" onclick="tab('remote')">🌐远控</div>
        <div class="nav-item" onclick="tab('conn')">🔗连接</div>
    </nav>

    <script>
        let chars = { w:null, c:null, k:null, k_type:'kisstoy' }; let coyV = { a:0, b:0 }; 
        let isLocked = false; let labMode = ''; let infCount = 0; let lastSend = 0; let peer=null;

        function log(m) { let d = document.getElementById('debug-log'); let e = document.createElement('div'); e.className='log-entry'; e.innerText="> "+m; d.prepend(e); }
        function tab(t) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- 核心：真·蓝牙引擎汪 ---
        async function bt(t) {
            const cfg = {
                wonder: { s: '0000ff00-0000-1000-8000-00805f9b34fb', c: '0000ff01-0000-1000-8000-00805f9b34fb', n: '0000ff02-0000-1000-8000-00805f9b34fb' },
                coyote: { s: '0000180c-0000-1000-8000-00805f9b34fb', c: '0000150a-0000-1000-8000-00805f9b34fb' },
                kiss:   { s: ['0000fff0-0000-1000-8000-00805f9b34fb', '0000cb60-0000-1000-8000-00805f9b34fb', '78667579-7b48-43db-b8c5-7928a6b0a335'], c: ['0000fff1-0000-1000-8000-00805f9b34fb', '0000cb61-0000-1000-8000-00805f9b34fb', '78667579-a914-49a4-8333-aa3c0cd8fedc'] }
            };
            try {
                log("全频道搜寻 " + t + " 中...");
                const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: t==='kiss'?cfg.kiss.s:[cfg[t].s] });
                const server = await device.gatt.connect();
                if(t === 'kiss') {
                    for(let i=0; i<3; i++){
                        try { let s = await server.getPrimaryService(cfg.kiss.s[i]); chars.k = await s.getCharacteristic(cfg.kiss.c[i]); chars.k_type = (i===2)?'magic':'kisstoy'; log("迷路合体！模式 "+chars.k_type); break; } catch(e){}
                    }
                } else {
                    const s = await server.getPrimaryService(cfg[t].s); chars[t[0]] = await s.getCharacteristic(cfg[t].c);
                    if(t==='wonder'){ const n = await s.getCharacteristic(cfg.wonder.n); await n.startNotifications(); n.addEventListener('characteristicvaluechanged', e => onPressure(e.target.value.getUint8(4))); }
                }
                document.getElementById('st-' + t[0]).classList.add('st-on');
                alert(t + " 链接成功汪！");
            } catch(e) { log("合体报错: " + e); }
        }

        function onPressure(p) { document.getElementById('p-lab').innerText = p; document.getElementById('p-mini').innerText = p + " kPa"; document.getElementById('head-p').innerText = p + " kPa"; }

        // --- 核心修复：暴力双发逻辑汪 ---
        async function kSy(mode) {
            let now = Date.now(); if(now - lastSend < 150) return; lastSend = now;
            let s = document.getElementById('sl-ks').value, v = document.getElementById('sl-kv').value;
            if(mode==='test') { s=150; v=150; alert("发射强制唤醒脉冲汪！"); }
            document.getElementById('txt-ks').innerText = Math.floor(s/2.55) + "%"; document.getElementById('txt-kv').innerText = Math.floor(v/2.55) + "%";
            if(!chars.k) return;
            try {
                // 暴力双发：0xAA 与 0x10 同时轰炸汪！
                await chars.k.writeValueWithoutResponse(new Uint8Array([0xAA, 0x02, (mode==='suck'?0x02:0x01), 0x00, 0x00, s]));
                await chars.k.writeValueWithoutResponse(new Uint8Array([0x10, 0xff, 0x04, 0x08, (mode==='suck'?0xBB:0xAA), Math.floor(s/2.55), 0x01]));
                log("已发送暴力双核指令汪！");
            } catch(e) { log("发送失败汪！"); }
        }

        function cSyUI() { document.getElementById('txt-cf').innerText=document.getElementById('sl-cf').value; document.getElementById('txt-cw').innerText=document.getElementById('sl-cw').value; cSync(); }
        function cAd(ch, d) { coyV[ch] = Math.max(0, Math.min(200, coyV[ch]+d)); document.getElementById('v-c'+ch).innerText=coyV[ch]; cSync(); }
        async function cSync() { if(chars.c) await chars.c.writeValueWithoutResponse(new Uint8Array([0xB0, 0x33, coyV.a, coyV.b, 100,100,100,100, 50,50,50,50, 100,100,100,100, 50,50,50,50])); }
        async function isla(c, d) { if(chars.w) await chars.w.writeValueWithoutResponse(new Uint8Array([0xFF, c, d])); if(c===0xA2 && d===0){ infCount++; document.getElementById('inf-cnt').innerText=infCount; } if(c===0xA3) isLocked=(d===0); }
        
        function initM() { let id=Math.floor(100000+Math.random()*900000); peer=new Peer('XN-'+id); peer.on('open', i=>document.getElementById('my-id').innerText=i.replace('XN-','')); }
        function initS() { alert("尝试远程合体中汪..."); tab('manual'); }
        function handleCmd(e) { if(e.key==='Enter'){ alert("指令 ["+e.target.value+"] 执行汪！"); e.target.value=''; } }
        function startL(s) { alert("剧本 ["+s+"] 启动汪！"); }
        function saveRecipe() { alert("存入大脑汪！"); }
    </script>
</body>
</html>
