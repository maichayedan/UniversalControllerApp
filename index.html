<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>感官指挥官 v12.0 - 终极服从协议 汪！</title>
    <style>
        :root { --bg: #050508; --card: #12121a; --purple: #a855f7; --blue: #3b82f6; --red: #ff2d55; --green: #22c55e; }
        body { background: var(--bg); color: #f8fafc; font-family: sans-serif; margin: 0; padding-bottom: 90px; }
        header { position: sticky; top: 0; background: rgba(5,5,8,0.9); backdrop-filter: blur(10px); padding: 12px; text-align: center; border-bottom: 1px solid #333; z-index: 100; }
        .content { padding: 12px; width: 100%; max-width: 500px; margin: 0 auto; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); transition: 0.5s; }
        
        /* 协议状态汪 */
        .stage-active { border: 2px solid var(--purple) !important; box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
        .lock-locked { background: rgba(255,45,85,0.1); border: 2px solid var(--red); pointer-events: none; opacity: 0.7; }
        
        .btn-start { background: var(--purple); color: white; border: none; padding: 20px; border-radius: 20px; width: 100%; font-size: 20px; font-weight: 900; cursor: pointer; }
        .timer-big { font-size: 48px; font-weight: 900; color: var(--purple); font-family: monospace; }
        .status-text { font-size: 14px; color: var(--green); margin-top: 10px; font-weight: bold; }
        input[type=number] { background: #222; border: 1px solid #444; color: var(--green); padding: 8px; border-radius: 8px; width: 70px; text-align: center; }
    </style>
</head>
<body>

    <header>🛡️ <b>香喏·终极服从协议中心</b></header>

    <div class="content">
        <!-- 1. 协议参数预设汪 -->
        <div id="setup-card" class="card">
            <h3>📝 协议编排汪</h3>
            <div style="display:flex; justify-content:space-between; margin:10px 0;">
                <span>禁断时长 (分钟)汪:</span>
                <input type="number" id="time-lock" value="30">
            </div>
            <div style="display:flex; justify-content:space-between; margin:10px 0;">
                <span>灌注水量 (ml)汪:</span>
                <input type="number" id="water-ml" value="250">
            </div>
            <div style="display:flex; justify-content:space-between; margin:10px 0;">
                <span>高潮诱导强度 (0-255):</span>
                <input type="number" id="final-v" value="255">
            </div>
            <button class="btn-start" id="btn-master" onclick="startUltimateProtocol()">🔒 开启协议：不准回头汪！</button>
        </div>

        <!-- 2. 实时执行监控汪 -->
        <div id="monitor-card" class="card hidden">
            <div style="text-align:center;">
                <div id="current-stage-title" style="color:var(--purple); font-weight:bold;">阶段一：强制禁断中...</div>
                <div class="timer-big" id="main-timer">00:00</div>
                <div id="stage-desc" style="font-size:12px; color:grey;">此阶段无法关闭，压力过线必遭电击汪！</div>
            </div>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <div style="display:flex; justify-content:space-around;">
                <div style="text-align:center;">
                    <small>压力 (kPa)</small><br><b id="p-val" style="color:var(--blue); font-size:24px;">0</b>
                </div>
                <div style="text-align:center;">
                    <small>红线</small><br><b style="color:var(--red); font-size:24px;">80</b>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chars = { wonder: null, coyote: null, kiss: null };
        let currentStage = 0; // 0:准备, 1:禁断, 2:灌肠, 3:释放汪
        let mainTimer = null;

        // 启动终极协议汪！
        async function startUltimateProtocol() {
            if(!confirm("汪！协议一旦开始，在时间抵达前将无法关闭，主人准备好服从了吗？")) return;
            
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('monitor-card').classList.remove('hidden');
            
            runStage1();
        }

        // 阶段一：强制禁断汪
        function runStage1() {
            currentStage = 1;
            document.getElementById('monitor-card').classList.add('stage-active');
            let timeLeft = parseInt(document.getElementById('time-lock').value) * 60;
            
            mainTimer = setInterval(() => {
                timeLeft--;
                updateDisplay(timeLeft);
                if(timeLeft <= 0) {
                    clearInterval(mainTimer);
                    runStage2();
                }
            }, 1000);
            
            // 此阶段禁止关闭网页提示汪
            window.onbeforeunload = () => "协议尚未完成，逃跑是要被惩罚的汪！";
        }

        // 阶段二：圣水洗礼汪
        async function runStage2() {
            currentStage = 2;
            document.getElementById('current-stage-title').innerText = "阶段二：圣水洗礼灌注中...";
            document.getElementById('current-stage-title').style.color = 'var(--blue)';
            
            let ml = parseInt(document.getElementById('water-ml').value);
            let sec = (ml / 100) * 60; // 100ml/min 科学流速汪
            
            if(chars.wonder) await islandCmd(0xA3, 0); // 开泵汪！
            
            mainTimer = setInterval(() => {
                sec--;
                document.getElementById('main-timer').innerText = "灌注中: " + Math.floor(sec) + "s";
                if(sec <= 0) {
                    clearInterval(mainTimer);
                    islandCmd(0xA3, 1); // 停泵汪
                    runStage3();
                }
            }, 1000);
        }

        // 阶段三：终极释放汪
        async function runStage3() {
            currentStage = 3;
            document.getElementById('current-stage-title').innerText = "阶段三：终极救赎！尽情享受吧汪！";
            document.getElementById('current-stage-title').style.color = 'var(--green)';
            document.getElementById('main-timer').innerText = "FREE";
            document.getElementById('stage-desc').innerText = "禁断锁已解除，诱导强度已拉满汪！";
            
            let finalV = parseInt(document.getElementById('final-v').value);
            if(chars.kiss) await chars.kiss.writeValue(new Uint8Array([0xAA, 0x02, 0x01, 0x00, 0x00, finalV]));
            
            window.onbeforeunload = null; // 释放后允许离开汪
            alert("汪！奖励时间到！尽情高潮吧主人！💖");
        }

        function updateDisplay(s) {
            let m = Math.floor(s / 60); let sec = s % 60;
            document.getElementById('main-timer').innerText = (m<10?'0':'')+m + ":" + (sec<10?'0':'')+sec;
        }

        async function islandCmd(c, d) { if(chars.wonder) await chars.wonder.writeValue(new Uint8Array([0xFF, c, d])); }
        // 蓝牙连接逻辑 (略，请主人确保已在连接页连好宝贝汪)...
    </script>
</body>
</html>
