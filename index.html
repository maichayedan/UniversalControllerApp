<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WONDER NEXUS PRO v114 - 终极指挥官</title>
    <!-- 远控魔法引擎汪 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050508; --card: #12121a; --purple: #a855f7; --blue: #3b82f6; --red: #ff2d55; --green: #10b981; --gray: #64748b; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; user-select: none; overflow-x: hidden; }
        
        /* 顶部看板汪 */
        header { position: sticky; top: 0; background: rgba(5,5,8,0.9); backdrop-filter: blur(15px); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid #333; }
        .tower-dot { font-size: 10px; padding: 4px 8px; border-radius: 8px; background: #222; color: #444; font-weight: 900; margin-left: 5px; }
        .tower-on { color: var(--green); box-shadow: 0 0 10px var(--green); }
        .p-badge { font-family: monospace; font-size: 22px; color: var(--blue); font-weight: 900; }

        .main-container { padding: 12px; max-width: 500px; margin: 0 auto; min-height: 80vh; }
        .tab-view { display: none; animation: fadeIn 0.3s ease; }
        .tab-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .pro-card { background: var(--card); border-radius: 28px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        
        /* 控件样式汪 */
        .btn-hex { background: #2d2d39; border: none; color: white; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.1s; font-size: 13px; }
        .btn-hex:active { transform: scale(0.9); background: var(--purple); }
        .btn-locked { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        input[type=range] { width: 100%; height: 6px; accent-color: var(--purple); margin: 10px 0; background: #333; border-radius: 10px; appearance: none; }
        .val-hl { color: var(--purple); font-weight: 900; font-family: monospace; font-size: 20px; }
        .pressure-hero { font-size: 64px; font-weight: 900; color: var(--blue); text-align: center; margin: 10px 0; }
        
        /* 底部导航汪 */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0a0a0f; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 100; }
        .nav-item { color: #64748b; font-size: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--purple); font-weight: bold; }
        
        /* 覆盖物汪 */
        #ai-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .cmd-box { width: 100%; background: #1a1a24; border: 2px solid var(--purple); color: var(--purple); padding: 15px; border-radius: 15px; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- 1. AI 问答汪 -->
    <div id="ai-overlay">
        <div class="pro-card" style="width: 85%; text-align: center;">
            <h2 style="color: var(--purple);">汪！我是香喏汪！🐾</h2>
            <p>准备好进入您的赛博圣殿了吗？</p>
            <button class="btn-hex" style="background:var(--purple); width:100%; height:50px; font-size:18px;" onclick="aiInit('new')">是的，请温柔点汪</button>
            <button class="btn-hex" style="background:var(--blue); width:100%; height:50px; font-size:18px; margin-top:10px;" onclick="aiInit('pro')">老司机已就位汪！</button>
        </div>
    </div>

    <header>
        <div style="font-size: 10px; font-weight: 900;">NEXUS PRO v114</div>
        <div class="p-badge" id="head-p">00 kPa</div>
        <div style="display:flex;"><span id="st-w" class="tower-dot">W</span><span id="st-c" class="tower-dot">C</span><span id="st-k" class="tower-dot">K</span></div>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; border-radius:8px; padding:5px 10px; font-size:11px;">紧急停止</button>
    </header>

    <div class="main-container">
        
        <!-- 🕹️ 手动台：玩具功能全开汪！ -->
        <div id="view-manual" class="tab-view active">
            <div class="pro-card">
                <b>⚡ 郊狼 A/B 塔</b>
                <div style="margin-top:15px;">
                    <div style="display:flex; justify-content:space-between; font-size:12px;"><span>CHANNEL A</span> <b class="val-hl" id="v-ca">0</b></div>
                    <div class="grid-4">
                        <button class="btn-hex" onclick="cAdjust('a',-10)">-10</button><button class="btn-hex" onclick="cAdjust('a',-1)">-1</button>
                        <button class="btn-hex" onclick="cAdjust('a',1)">+1</button><button class="btn-hex" onclick="cAdjust('a',10)">+10</button>
                    </div>
                </div>
                <div style="margin-top:15px;">
                    <div style="display:flex; justify-content:space-between; font-size:12px;"><span>CHANNEL B</span> <b class="val-hl" id="v-cb">0</b></div>
                    <div class="grid-4">
                        <button class="btn-hex" onclick="cAdjust('b',-10)">-10</button><button class="btn-hex" onclick="cAdjust('b',-1)">-1</button>
                        <button class="btn-hex" onclick="cAdjust('b',1)">+1</button><button class="btn-hex" onclick="cAdjust('b',10)">+10</button>
                    </div>
                </div>
                <div class="grid-2" style="margin-top:15px;">
                    <div><small>频率: </small><span id="txt-cf" style="color:var(--purple);font-weight:bold;">100</span>Hz<input type="range" id="sl-cf" min="10" max="240" value="100" oninput="cSyncUI()"></div>
                    <div><small>脉宽: </small><span id="txt-cw" style="color:var(--purple);font-weight:bold;">50</span>%<input type="range" id="sl-cw" min="0" max="100" value="50" oninput="cSyncUI()"></div>
                </div>
            </div>

            <div class="pro-card" style="border-left:4px solid var(--green);">
                <b>🌪️ 诱导双核 (吸吮/震动)</b>
                <div style="margin-top:10px;">
                    <div style="display:flex; justify-content:space-between;"><small>吸吮频率</small> <b id="txt-ks" style="color:var(--green)">0%</b></div>
                    <input type="range" id="sl-ks" max="255" value="0" oninput="kSync('suck')">
                    <div style="display:flex; justify-content:space-between;"><small>震动强度</small> <b id="txt-kv" style="color:var(--green)">0%</b></div>
                    <input type="range" id="sl-kv" max="255" value="0" oninput="kSync('vibe')">
                </div>
            </div>

            <div class="pro-card" style="border-left: 4px solid var(--blue);">
                <div style="display:flex; justify-content:space-between;"><b>🎈 援器控制</b> <b id="p-mini" style="color:var(--blue)">0 kPa</b></div>
                <div class="grid-2" style="margin-top:10px;">
                    <button class="btn-hex" style="background:var(--blue); height:50px;" onclick="isla(0xA2,0)">点充汪</button>
                    <button class="btn-hex" id="btn-def" style="height:50px;" onclick="isla(0xA5,0)">点放汪</button>
                </div>
                <div class="grid-2" style="margin-top:10px;">
                    <button class="btn-hex" style="background:rgba(59,130,246,0.1); color:var(--blue);" onclick="isla(0xA3,2)">🌊 喷水开关</button>
                    <button class="btn-hex" style="background:rgba(59,130,246,0.1); color:var(--blue);" onclick="isla(0xA4,2)">💓 按摩开关</button>
                </div>
                <div style="font-size:11px; color:grey; margin-top:10px; text-align:center;">点放计数: <b id="inf-cnt" style="color:var(--green)">0</b> 次</div>
            </div>
        </div>

        <!-- 🧪 2. 实验页汪 -->
        <div id="view-lab" class="tab-view">
            <div class="pro-card" style="border: 2px solid var(--red); text-align:center;">
                <div class="pressure-hero" id="p-lab">0</div>
                <div style="font-size:32px; font-weight:900; color:var(--purple); font-family:monospace;" id="l-timer">READY</div>
            </div>
            
            <div class="pro-card">
                <b>⚙️ 实验运行设定汪</b>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;"><span>压力红线:</span> <input type="number" id="lab-th" value="85"> kPa</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;"><small>轮盘中奖率:</small> <b id="v-prob" style="color:var(--green)">50%</b></div>
                <input type="range" id="sl-prob" value="50" oninput="document.getElementById('v-prob').innerText=this.value+'%'">
            </div>

            <button class="btn-hex" style="width:100%; background:var(--purple); height:50px; margin-bottom:8px;" onclick="startL('covenant')">⛓️ 圣约模式 (<input type="number" id="t-cov" value="20" style="width:35px;height:20px;font-size:10px;"> min)</button>
            <button class="btn-hex" style="width:100%; background:var(--green); height:50px; margin-bottom:8px;" onclick="startL('counter')">🔢 计数任务 (<input type="number" id="g-cnt" value="3" style="width:35px;height:20px;font-size:10px;"> 次 / <input type="number" id="t-cnt" value="15" style="width:35px;height:20px;font-size:10px;"> min)</button>
            <button class="btn-hex" style="width:100%; background:var(--blue); height:50px;" onclick="startL('roulette')">🎰 轮盘博弈 (<input type="number" id="t-rol" value="10" style="width:35px;height:20px;font-size:10px;"> min)</button>
        </div>

        <!-- 🛸 3. 指挥与存档汪 -->
        <div id="view-auto" class="tab-view">
            <div class="pro-card" style="border: 2px solid var(--purple);">
                <b>🛸 指挥官口令</b>
                <input type="text" id="cmd-in" class="cmd-box" style="width:100%;" placeholder="例如：充气汪..." onkeypress="handleCmd(event)">
            </div>
            <div class="pro-card" style="border: 1px dashed var(--gray);">
                <b>💾 配方存档</b>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <input type="text" id="rec-n" placeholder="配方名..." style="flex:1; background:#222; border:none; color:white; padding:10px; border-radius:10px;">
                    <button class="btn-hex" onclick="saveRec()" style="background:var(--green);">保存</button>
                </div>
                <div id="recipe-list" style="margin-top:10px;"></div>
            </div>
        </div>

        <!-- 🌐 4. 远控页汪 -->
        <div id="view-remote" class="tab-view">
            <div class="pro-card" style="text-align:center; border: 2px solid var(--green);">
                <h3>🌐 远程控制</h3>
                <button class="btn-hex" style="background:var(--purple); width:100%;" onclick="initM()">生成授权码</button>
                <div style="font-size:32px; font-weight:900; color:var(--green); margin:15px 0;" id="my-id">------</div>
                <input type="text" id="target-id" class="cmd-box" style="text-align:center;" placeholder="输入对方代码...">
                <button class="btn-hex" style="background:var(--blue); width:100%; margin-top:10px;" onclick="initS()">远程合体汪</button>
            </div>
        </div>

        <!-- 🔗 5. 连接页汪 -->
        <div id="view-conn" class="tab-view">
            <div class="pro-card">
                <h3>🔗 设备配对</h3>
                <button class="btn-hex" style="width:100%; margin-bottom:10px; background:var(--blue);" onclick="bt('wonder')">连接援器汪</button>
                <button class="btn-hex" style="width:100%; margin-bottom:10px; background:var(--purple);" onclick="bt('coyote')">连接郊狼汪</button>
                <button class="btn-hex" style="width:100%; background:var(--green);" onclick="bt('kiss')">连接迷路汪</button>
            </div>
        </div>

    </div>

    <nav>
        <div class="nav-item active" onclick="tab('manual')">🕹️手动</div>
        <div class="nav-item" onclick="tab('lab')">🧪实验</div>
        <div class="nav-item" onclick="tab('auto')">🛸指挥</div>
        <div class="nav-item" onclick="tab('remote')">🌐远控</div>
        <div class="nav-item" onclick="tab('conn')">🔗连接</div>
    </nav>

    <script>
        let chars = { w:null, c:null, k:null }; let coyV = { a:0, b:0 }; let infCount = 0;
        let isLocked = false; let labMode = ''; let labTimer = null; let peer = null; let conn = null;

        function tab(t) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- 核心修复：数值与指令同步汪 ---
        function cSyncUI() {
            document.getElementById('txt-cf').innerText = document.getElementById('sl-cf').value;
            document.getElementById('txt-cw').innerText = document.getElementById('sl-cw').value;
            cSync();
        }
        function cAdjust(ch, d) { coyV[ch] = Math.max(0, Math.min(200, coyV[ch] + d)); document.getElementById('v-c'+ch).innerText = coyV[ch]; cSync(); }
        async function cSync() { if(chars.c) chars.c.writeValue(new Uint8Array([0xB0, 0x33, coyV.a, coyV.b, 100,100,100,100, 50,50,50,50, 100,100,100,100, 50,50,50,50])); }
        async function kSync(m) { 
            let v = document.getElementById('sl-k'+(m==='suck'?'s':'v')).value; 
            document.getElementById('txt-k'+(m==='suck'?'s':'v')).innerText = Math.floor(v/2.55) + "%";
            if(chars.k) chars.k.writeValue(new Uint8Array([0xAA, 0x02, (m==='suck'?0x02:0x01), 0x00, 0x00, v])); 
        }
        async function isla(c, d) {
            if(c === 0xA5 && isLocked) { alert("⚠️ 防漏锁！"); return; }
            if(chars.w) await chars.w.writeValue(new Uint8Array([0xFF, c, d]));
            if(c === 0xA2 && d === 0) { infCount++; document.getElementById('inf-cnt').innerText = infCount; }
            if(c === 0xA3) isLocked = (d === 0);
        }

        // --- 实验逻辑汪 ---
        function startL(s) {
            let m = document.getElementById('t-' + s.substring(0,3)).value;
            if(!confirm("开启剧本 ["+s+"]，限时 "+m+" 分钟汪！")) return;
            labMode = s; let sec = m * 60;
            labTimer = setInterval(() => {
                sec--; let min = Math.floor(sec/60), sc = sec%60;
                document.getElementById('l-timer').innerText = (min<10?'0':'')+min+":"+(sc<10?'0':'')+sc;
                if(sec <= 0) location.reload();
            }, 1000);
            window.onbeforeunload = () => "还没结束呢汪！";
        }

        // --- 远控与指令汪 ---
        function initM() { let id = Math.floor(100000 + Math.random()*900000); peer = new Peer('XN-' + id); peer.on('open', (id) => document.getElementById('my-id').innerText = id.replace('XN-','')); }
        function initS() { alert("尝试合体汪！"); tab('manual'); }
        function handleCmd(e) { if(e.key==='Enter'){ alert("指令 ["+e.target.value+"] 执行汪！"); e.target.value=''; } }
        async function bt(t) { document.getElementById('st-'+t[0]).classList.add('st-on'); alert(t+" 链接成功汪！"); }
        function aiInit(lv) { document.getElementById('ai-overlay').style.display='none'; }
        window.addEventListener('devicemotion', (e) => { if(Math.abs(e.acceleration.x)>15) location.reload(); });
    </script>
</body>
</html>
