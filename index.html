<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>感官指挥官 v5.0 - 终极实验室 汪！</title>
    <style>
        :root { --bg: #0a0a0f; --card: #16161e; --purple: #a855f7; --blue: #3b82f6; --red: #f43f5e; --green: #10b981; }
        body { background: var(--bg); color: #f8fafc; font-family: sans-serif; margin: 0; padding-bottom: 90px; user-select: none; }
        header { position: sticky; top: 0; background: rgba(10,10,15,0.9); backdrop-filter: blur(10px); padding: 12px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid #333; }
        .content { padding: 12px; width: 100%; max-width: 500px; margin: 0 auto; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 24px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        
        /* 导航汪 */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #111; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 100; }
        .nav-item { color: #64748b; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--purple); font-weight: bold; }

        /* 按钮与控制汪 */
        .btn-ctrl { background: #2d2d39; border: none; color: white; padding: 15px; border-radius: 12px; font-weight: bold; font-family: monospace; cursor: pointer; }
        .btn-ctrl:active { background: var(--purple); }
        .grid-ctrl { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .btn-p { background: var(--purple); }
        .btn-b { background: var(--blue); }
        .btn-stop { background: var(--red); color: white; width: 100%; height: 60px; border-radius: 15px; font-size: 18px; font-weight: 900; }
        
        input[type=range] { width: 100%; accent-color: var(--purple); }
        .val-display { font-size: 24px; font-weight: 900; color: var(--purple); }
        .pressure-hero { font-size: 64px; font-weight: 900; color: var(--blue); text-align: center; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 12px;">🛰️ <b>香喏·感官总站</b></div>
        <div id="status-icons">⏳</div>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; border-radius:8px; padding:5px 10px;">紧急断电</button>
    </header>

    <!-- 1. 连接页汪 -->
    <div id="tab-conn" class="content">
        <div class="card">
            <h3>🔗 设备配对</h3>
            <button class="btn-ctrl btn-b" style="width:100%; margin-bottom:10px;" onclick="btConn('wonder')">配对：奇妙岛援器</button>
            <button class="btn-ctrl btn-p" style="width:100%; margin-bottom:10px;" onclick="btConn('coyote')">配对：DG-Lab 郊狼</button>
            <button class="btn-ctrl" style="width:100%; background:var(--green);" onclick="btConn('kiss')">配对：震动玩具</button>
        </div>
    </div>

    <!-- 2. 手动控制页汪 (A/B 独立按钮版) -->
    <div id="tab-manual" class="content hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between;"><b>⚡ 郊狼通道 A</b> <span class="val-display" id="txt-ca">0</span></div>
            <div class="grid-ctrl">
                <button class="btn-ctrl" onclick="coyShift('a', -10)">-10</button>
                <button class="btn-ctrl" onclick="coyShift('a', -1)">-1</button>
                <button class="btn-ctrl" onclick="coyShift('a', 1)">+1</button>
                <button class="btn-ctrl" onclick="coyShift('a', 10)">+10</button>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:20px;"><b>⚡ 郊狼通道 B</b> <span class="val-display" id="txt-cb">0</span></div>
            <div class="grid-ctrl">
                <button class="btn-ctrl" onclick="coyShift('b', -10)">-10</button>
                <button class="btn-ctrl" onclick="coyShift('b', -1)">-1</button>
                <button class="btn-ctrl" onclick="coyShift('b', 1)">+1</button>
                <button class="btn-ctrl" onclick="coyShift('b', 10)">+10</button>
            </div>
        </div>

        <div class="card">
            <b>🎈 援器手动</b>
            <div class="grid-ctrl">
                <button class="btn-ctrl btn-b" style="grid-column: span 2;" onmousedown="islandStep(0xA2, 0)" onmouseup="islandStep(0xA2, 1)">点放充气</button>
                <button class="btn-ctrl" style="grid-column: span 2;" onmousedown="islandStep(0xA5, 0)" onmouseup="islandStep(0xA5, 1)">点放放气</button>
            </div>
            <button class="btn-ctrl btn-b" style="width:100%; margin-top:10px;" onclick="islandStep(0xA3, 2)">🌊 喷水泵开关</button>
        </div>
    </div>

    <!-- 3. 实验室自动页汪 -->
    <div id="tab-auto" class="content hidden">
        <div class="card" style="text-align:center; border: 2px solid var(--blue);">
            <div style="color:grey; font-size:12px;">当前实时压力汪</div>
            <div class="pressure-hero" id="p-now">0</div>
            <div>禁断红线: <input type="number" id="lab-th" value="80" style="width:60px; background:none; border:none; border-bottom:2px solid var(--purple); color:white; font-size:24px; text-align:center;"> kPa</div>
        </div>

        <div class="card">
            <b>🎭 自动剧本选择</b>
            <button class="btn-ctrl btn-p" style="width:100%; margin:5px 0;" onclick="startScript('tide')">心跳潮汐汪 (强度自动呼吸)</button>
            <button class="btn-ctrl btn-b" style="width:100%; margin:5px 0;" onclick="startScript('chaos')">赛博乱斗汪 (随机组合动作)</button>
            <div class="card" style="background:rgba(244,63,94,0.1); border:1px solid var(--red); margin-top:10px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b style="color:var(--red);">高潮禁断模式已开启汪！</b>
                    <input type="checkbox" id="lab-lock" checked style="width:24px;height:24px;">
                </div>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('conn')"><span>🔗</span>配对</div>
        <div class="nav-item" onclick="switchTab('manual')"><span>🕹️</span>手动</div>
        <div class="nav-item" onclick="switchTab('auto')"><span>🧠</span>实验</div>
    </nav>

    <script>
        let chars = { wonder: null, coyote: null, kiss: null };
        let coyVal = { a: 0, b: 0 };
        let scriptTimer = null;

        function switchTab(t) {
            document.querySelectorAll('.content').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        async function btConn(t) {
            const cfg = {
                wonder: { s: '0000ff00-0000-1000-8000-00805f9b34fb', c: '0000ff01-0000-1000-8000-00805f9b34fb', n: '0000ff02-0000-1000-8000-00805f9b34fb' },
                coyote: { s: '0000180c-0000-1000-8000-00805f9b34fb', c: '0000150a-0000-1000-8000-00805f9b34fb' },
                kiss:   { s: '0000cb60-0000-1000-8000-00805f9b34fb', c: '0000cb61-0000-1000-8000-00805f9b34fb' }
            };
            try {
                const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [cfg[t].s] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(cfg[t].s);
                chars[t] = await service.getCharacteristic(cfg[t].c);
                if (t === 'wonder') {
                    const n = await service.getCharacteristic(cfg[t].n);
                    await n.startNotifications();
                    n.addEventListener('characteristicvaluechanged', e => {
                        let p = e.target.value.getUint8(4);
                        document.getElementById('p-now').innerText = p;
                        if (p >= document.getElementById('lab-th').value && document.getElementById('lab-lock').checked) punish();
                    });
                }
                alert(t + " 链接成功！");
            } catch(e) { console.log(e); }
        }

        function coyShift(ch, delta) {
            coyVal[ch] = Math.max(0, Math.min(200, coyVal[ch] + delta));
            document.getElementById('txt-c' + ch).innerText = coyVal[ch];
            coySend();
        }

        async function coySend() {
            if(chars.coyote) {
                let cmd = new Uint8Array(20).fill(0); cmd[0]=0xB0; cmd[1]=0x33;
                cmd[2]=coyVal.a; cmd[3]=coyVal.b;
                await chars.coyote.writeValue(cmd);
            }
        }

        async function punish() {
            if(chars.coyote) {
                let cmd = new Uint8Array(20).fill(0); cmd[0]=0xB0; cmd[1]=0x33; cmd[2]=150; cmd[3]=150;
                await chars.coyote.writeValue(cmd);
                setTimeout(() => { coyVal.a=0; coyVal.b=0; coySend(); }, 3000);
            }
        }

        async function islandStep(c, d) { if(chars.wonder) await chars.wonder.writeValue(new Uint8Array([0xFF, c, d])); }

        function startScript(s) {
            clearInterval(scriptTimer);
            if(s === 'tide') {
                let v = 0; let up = true;
                scriptTimer = setInterval(() => { v=up?v+2:v-2; if(v>=100||v<=0) up=!up; coyVal.a=v; coySend(); }, 200);
            } else if(s === 'chaos') {
                scriptTimer = setInterval(() => { coyVal.a=Math.random()*100; coySend(); if(Math.random()>0.7) islandStep(0xA3, 2); }, 2000);
            }
        }
    </script>
</body>
</html>
