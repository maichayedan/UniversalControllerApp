<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>感官指挥官 v4.0 - 安全大师版 汪！</title>
    <style>
        :root { --bg: #0a0a0f; --card: #16161e; --purple: #a855f7; --blue: #3b82f6; --red: #f43f5e; --green: #10b981; --warn: #f59e0b; }
        body { background: var(--bg); color: #f8fafc; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        header { position: sticky; top: 0; background: rgba(10,10,15,0.9); backdrop-filter: blur(10px); padding: 12px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid #222; }
        .content-view { padding: 12px; width: 100%; max-width: 500px; margin: 0 auto; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #16161e; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 100; }
        .nav-item { color: #64748b; font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--purple); font-weight: bold; }
        .btn-action { background: #334155; border: none; color: white; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .pressure-hero { font-size: 52px; font-weight: 900; color: var(--blue); text-align: center; }
        .hidden { display: none; }
        .safe-tag { font-size: 10px; background: var(--green); color: black; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        .warn-tag { font-size: 10px; background: var(--red); color: white; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 12px;">🛡️ <b>香喏安全盾系统</b></div>
        <button onclick="location.reload()" style="background: var(--red); border: none; color: white; padding: 5px 12px; border-radius: 8px; font-size: 12px;">一键断电</button>
    </header>

    <!-- 视图 1: 配对汪 -->
    <div id="v-conn" class="content-view">
        <div class="card">
            <h3>🔗 唤醒宝贝汪</h3>
            <button class="btn-action" style="width: 100%; margin-bottom: 8px; background: var(--blue);" onclick="btConn('wonder')">配对：奇妙岛援器</button>
            <button class="btn-action" style="width: 100%; margin-bottom: 8px; background: var(--purple);" onclick="btConn('coyote')">配对：DG-Lab 郊狼</button>
            <button class="btn-action" style="width: 100%; background: var(--green);" onclick="btConn('kiss')">配对：小吻震动玩具</button>
        </div>
    </div>

    <!-- 视图 2: 手动台 (安全优化版) 汪 -->
    <div id="v-manual" class="content-view hidden">
        <div class="card">
            <div style="display: flex; justify-content: space-between;"><b>🎈 援器控制</b> <span class="safe-tag">点放模式已开启</span></div>
            <div class="pressure-hero" id="p-now">0 <small style="font-size: 14px;">kPa</small></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-action" style="background: var(--blue);" onclick="islandStep(0xA2)">点一下充气</button>
                <button class="btn-action" style="background: #1e293b;" onclick="islandStep(0xA5)">点一下放气</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between;"><b>⚡ 郊狼雷电</b> <span id="coy-warn" class="safe-tag">安全限速中</span></div>
            <div style="margin: 10px 0;">
                <div style="display:flex; justify-content:space-between; font-size:12px;"><span>强度 (Max 100)</span> <span id="txt-ca" style="color:var(--purple)">0</span></div>
                <input type="range" id="sl-ca" max="100" oninput="coyUpdate()">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 11px;">
                <button class="btn-action" style="font-size:10px;" onclick="unlockCoyote()">解除强度锁(危险!)</button>
                <select id="coy-f" onchange="coyUpdate()" style="background:#222; color:white; border:none; border-radius:8px;">
                    <option value="100">常规脉冲</option><option value="20">沉重撞击</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 视图 3: 说明书汪 -->
    <div id="v-manual-doc" class="content-view hidden">
        <h3>📖 安全操作手册汪</h3>
        <div class="card" style="font-size: 13px; line-height: 1.6; color: #cbd5e1;">
            <b style="color: var(--warn);">[郊狼安全]</b><br>
            • 强度超过 100 档后请务必谨慎汪！<br>
            • 每次使用建议不超过 30 分钟。<br>
            • 严禁用于头部和心脏区域汪！<br><br>
            <b style="color: var(--blue);">[援器安全]</b><br>
            • 充气建议采用“点放模式”，观察压力增长。<br>
            • 正常红线为 120 kPa，新手建议 80 kPa。<br>
            • 感到腹部疼痛请立即点“一键断电”并放气汪！
        </div>
    </div>

    <nav>
        <div class="nav-item active" id="n-conn" onclick="switchTab('conn')"><span>🔗</span>连接</div>
        <div class="nav-item" id="n-manual" onclick="switchTab('manual')"><span>🕹️</span>控制</div>
        <div class="nav-item" id="n-manual-doc" onclick="switchTab('manual-doc')"><span>📖</span>手册</div>
    </nav>

    <script>
        let chars = { wonder: null, coyote: null, kiss: null };
        let coyLocked = true;

        function switchTab(tab) {
            document.querySelectorAll('.content-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('v-' + tab).classList.remove('hidden');
            document.getElementById('n-' + tab).classList.add('active');
        }

        async function btConn(t) {
            const cfg = {
                wonder: { s: '0000ff00-0000-1000-8000-00805f9b34fb', c: '0000ff01-0000-1000-8000-00805f9b34fb', n: '0000ff02-0000-1000-8000-00805f9b34fb' },
                coyote: { s: '0000180c-0000-1000-8000-00805f9b34fb', c: '0000150a-0000-1000-8000-00805f9b34fb' },
                kiss:   { s: '0000cb60-0000-1000-8000-00805f9b34fb', c: '0000cb61-0000-1000-8000-00805f9b34fb' }
            };
            try {
                const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [cfg[t].s] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(cfg[t].s);
                chars[t] = await service.getCharacteristic(cfg[t].c);
                if (t === 'wonder') {
                    const n = await service.getCharacteristic(cfg[t].n);
                    await n.startNotifications();
                    n.addEventListener('characteristicvaluechanged', e => {
                        document.getElementById('p-now').innerText = e.target.value.getUint8(4);
                    });
                }
                alert(t + " 链接成功汪！");
            } catch(e) { alert("失败了: " + e); }
        }

        // 安全点放模式：开启 500ms 后自动关闭汪！
        async function islandStep(cmd) {
            if(!chars.wonder) return;
            await chars.wonder.writeValue(new Uint8Array([0xFF, cmd, 0])); // 开启
            setTimeout(async () => {
                await chars.wonder.writeValue(new Uint8Array([0xFF, cmd, 1])); // 500ms 后自动关闭汪
            }, 500);
        }

        function unlockCoyote() {
            if(confirm("警告：强度超过 100 可能会导致肌肉损伤或电烧伤！香喏不建议老司机以外的人开启汪！确定要继续吗？")) {
                document.getElementById('sl-ca').max = 200;
                document.getElementById('coy-warn').innerText = "!!! 狂暴模式开启中 !!!";
                document.getElementById('coy-warn').className = "warn-tag";
            }
        }

        async function coyUpdate() {
            let i = document.getElementById('sl-ca').value;
            let f = document.getElementById('coy-f').value;
            document.getElementById('txt-ca').innerText = i;
            if(chars.coyote) {
                let cmd = new Uint8Array(20).fill(0); cmd[0]=0xB0; cmd[1]=0x33; cmd[2]=i;
                for(let x=4; x<8; x++) cmd[x]=f;
                await chars.coyote.writeValue(cmd);
            }
        }
    </script>
</body>
</html>
