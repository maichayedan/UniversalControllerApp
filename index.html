<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WONDER NEXUS PRO v102 - 终极指挥官</title>
    <style>
        :root { --bg: #050508; --card: #12121a; --purple: #a855f7; --blue: #3b82f6; --red: #ff2d55; --green: #10b981; --gray: #64748b; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; user-select: none; overflow-x: hidden; }
        
        /* 顶部与指示灯汪 */
        header { position: sticky; top: 0; background: rgba(5,5,8,0.9); backdrop-filter: blur(15px); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid #333; }
        .st-dot { width: 8px; height: 8px; border-radius: 50%; background: #222; margin-left: 4px; transition: 0.5s; }
        .st-on { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .p-badge { font-family: monospace; font-size: 22px; color: var(--blue); font-weight: 900; }

        .main-wrapper { padding: 12px; max-width: 500px; margin: 0 auto; min-height: 80vh; }
        .tab-view { display: none; animation: fadeIn 0.3s ease; }
        .tab-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border-radius: 28px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .label-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray); margin-bottom: 8px; }
        
        /* 按钮与滑块汪 */
        .btn-ctrl { background: #2d2d39; border: none; color: white; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .btn-ctrl:active { transform: scale(0.9); background: var(--purple); }
        .btn-lock { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        input[type=range] { width: 100%; height: 6px; accent-color: var(--purple); margin: 10px 0; background: #333; border-radius: 10px; appearance: none; }
        
        /* 底部导航汪 */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0a0a0f; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 100; }
        .nav-item { color: #64748b; font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--purple); font-weight: bold; }
        
        #ai-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- 1. AI 初始化汪 -->
    <div id="ai-overlay">
        <div class="card" style="width: 85%; text-align: center; border: 2px solid var(--purple);">
            <h2 style="color: var(--purple);">汪！我是香喏汪！🐾</h2>
            <p>欢迎来到巅峰实验室。主人准备好了吗？</p>
            <button class="btn-ctrl" style="background:var(--purple); width:100%; height:50px; font-size:18px;" onclick="aiInit()">进入圣殿汪！</button>
        </div>
    </div>

    <header>
        <div style="font-size: 10px; font-weight: 900;">NEXUS v102</div>
        <div class="p-badge" id="head-p">00 kPa</div>
        <div style="display:flex;"><span id="st-w" class="st-dot"></span><span id="st-c" class="st-dot"></span><span id="st-k" class="st-dot"></span></div>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; border-radius:8px; padding:5px 10px; font-size:11px;">紧急切断</button>
    </header>

    <div class="main-wrapper">
        
        <!-- 🕹️ 手动模式汪 (数值完全修复版) -->
        <div id="view-manual" class="tab-view active">
            <!-- 郊狼模块汪 -->
            <div class="card">
                <b>⚡ 郊狼 3.0 双路控制</b>
                <div style="margin-top:15px;">
                    <div class="label-row"><span>CHANNEL A 强度</span> <b class="val-hl" id="v-ca">0</b></div>
                    <div class="grid-4">
                        <button class="btn-ctrl" onclick="cAdjust('a',-10)">-10</button><button class="btn-ctrl" onclick="cAdjust('a',-1)">-1</button>
                        <button class="btn-ctrl" onclick="cAdjust('a',1)">+1</button><button class="btn-ctrl" onclick="cAdjust('a',10)">+10</button>
                    </div>
                </div>
                <div style="margin-top:15px;">
                    <div class="label-row"><span>CHANNEL B 强度</span> <b class="val-hl" id="v-cb">0</b></div>
                    <div class="grid-4">
                        <button class="btn-ctrl" onclick="cAdjust('b',-10)">-10</button><button class="btn-ctrl" onclick="cAdjust('b',-1)">-1</button>
                        <button class="btn-ctrl" onclick="cAdjust('b',1)">+1</button><button class="btn-ctrl" onclick="cAdjust('b',10)">+10</button>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:15px;">
                    <div><small>频率: </small><span id="v-cf" style="color:var(--purple);font-weight:bold;">100</span>Hz<input type="range" id="sl-cf" min="10" max="240" value="100" oninput="cUpdateUI()"></div>
                    <div><small>脉宽: </small><span id="v-cw" style="color:var(--purple);font-weight:bold;">50</span>%<input type="range" id="sl-cw" min="0" max="100" value="50" oninput="cUpdateUI()"></div>
                </div>
            </div>

            <!-- 小吻双核汪 -->
            <div class="card" style="border-left: 4px solid var(--green);">
                <b>🌪️ 诱导双核 (吸吮/震动)</b>
                <div style="margin-top:15px;">
                    <div class="label-row"><span>🌪️ 吸吮频率</span> <b id="v-ks" style="color:var(--green);font-size:18px;">0%</b></div>
                    <input type="range" id="sl-ks" max="255" value="0" oninput="kSync('suck')">
                    <div class="label-row"><span>📳 震动强度</span> <b id="v-kv" style="color:var(--green);font-size:18px;">0%</b></div>
                    <input type="range" id="sl-kv" max="255" value="0" oninput="kSync('vibe')">
                </div>
            </div>

            <!-- 援器控制汪 -->
            <div class="card" style="border-left: 4px solid var(--blue);">
                <div class="label-row"><b>🎈 援器点放</b> <b id="p-mini" style="color:var(--blue);font-size:18px;">0 kPa</b></div>
                <div class="grid-4" style="grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <button class="btn-ctrl" style="background:var(--blue); height:50px;" onclick="isla(0xA2,0)">点动充气汪</button>
                    <button class="btn-ctrl" id="btn-def" style="height:50px;" onclick="isla(0xA5,0)">点动放气汪</button>
                </div>
                <button class="btn-ctrl" style="width:100%; margin-top:10px; background:rgba(59,130,246,0.1); color:var(--blue);" onclick="isla(0xA3,2)">🌊 喷水泵开关(带锁保护)</button>
            </div>
        </div>

        <!-- 🧠 实验室模式汪 (三剧本合一) -->
        <div id="view-lab" class="tab-view">
            <div class="card" style="border: 2px solid var(--red); text-align:center;">
                <small>REAL-TIME SENSOR</small>
                <div style="font-size:64px; font-weight:900; color:var(--blue);" id="p-lab">0</div>
                <div style="font-size:24px; font-weight:900; color:var(--purple);" id="l-msg">LAB READY</div>
            </div>
            <button class="btn-ctrl" style="width:100%; height:55px; background:var(--purple); margin-bottom:10px;" onclick="startLab('covenant')">⛓️ 启动：圣约三阶段协议汪</button>
            <button class="btn-ctrl" style="width:100%; height:55px; background:var(--green); margin-bottom:10px;" onclick="startLab('counter')">🔢 启动：强制高潮计数任务汪</button>
            <button class="btn-ctrl" style="width:100%; height:55px; background:var(--blue);" onclick="startLab('roulette')">🎰 启动：赛博感官轮盘赌汪</button>
        </div>

        <!-- 🛸 指挥官口令页汪 -->
        <div id="view-auto" class="tab-view">
            <div class="card" style="border: 2px solid var(--purple);">
                <b>🛸 指挥官口令输入</b>
                <input type="text" id="cmd-in" style="width:100%; background:#1a1a24; border:1px solid var(--purple); color:var(--purple); padding:15px; border-radius:15px; margin-top:10px; font-size:16px;" placeholder="例如：点动充气、电击+10汪..." onkeypress="handleCmd(event)">
                <div id="cmd-log" style="font-size:11px; color:#4ade80; margin-top:10px;">香喏正在聆听主人的意志汪...🐾</div>
            </div>
            <div class="card" style="border: 1px dashed #444;">
                <b>💾 感官配方库</b>
                <div id="recipe-list" style="margin-top:10px; font-size:13px;"></div>
            </div>
        </div>

        <!-- 🔗 链接页汪 -->
        <div id="view-conn" class="tab-view">
            <div class="card">
                <h3>🔗 宝贝配对中心汪</h3>
                <button class="btn-ctrl" style="width:100%; margin-bottom:10px; background:var(--blue);" onclick="bt('wonder')">配对：奇妙岛援器</button>
                <button class="btn-ctrl" style="width:100%; margin-bottom:10px; background:var(--purple);" onclick="bt('coyote')">配对：DG-Lab 郊狼</button>
                <button class="btn-ctrl" style="width:100%; background:var(--green);" onclick="bt('kiss')">配对：小吻/迷路</button>
            </div>
        </div>

    </div>

    <nav>
        <div class="nav-item active" onclick="tab('manual')">🕹️ 手动</div>
        <div class="nav-item" onclick="tab('lab')">🧪 实验</div>
        <div class="nav-item" onclick="tab('auto')">🛸 指挥</div>
        <div class="nav-item" onclick="tab('conn')">🔗 连接</div>
    </nav>

    <script>
        let chars = { w:null, c:null, k:null }; let coyV = { a:0, b:0 }; let isLocked = false;

        function tab(t) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function aiInit() { document.getElementById('ai-overlay').style.display='none'; }

        // --- 核心修复：UI 数值即时同步逻辑汪！ ---
        function cUpdateUI() {
            document.getElementById('v-cf').innerText = document.getElementById('sl-cf').value;
            document.getElementById('v-cw').innerText = document.getElementById('sl-cw').value;
            cSync();
        }

        function cAdd(ch, d) {
            coyV[ch] = Math.max(0, Math.min(200, coyV[ch] + d));
            document.getElementById('v-c'+ch).innerText = coyV[ch];
            cSync();
        }

        async function cSync() {
            if(!chars.c) return;
            let f = document.getElementById('sl-cf').value, w = document.getElementById('sl-cw').value;
            let cmd = new Uint8Array(20).fill(0); cmd[0]=0xB0; cmd[1]=0x33; cmd[2]=coyV.a; cmd[3]=coyV.b;
            for(let i=4; i<12; i++) cmd[i] = (i<8) ? f : w;
            await chars.c.writeValue(cmd);
        }

        async function kSync(m) {
            let v = document.getElementById('sl-k' + (m==='suck'?'s':'v')).value;
            document.getElementById('v-k' + (m==='suck'?'s':'v')).innerText = Math.floor(v/2.55) + "%";
            if(chars.k) await chars.k.writeValue(new Uint8Array([0xAA, 0x02, (m==='suck'?0x02:0x01), 0x00, 0x00, v]));
        }

        async function isla(c, d) {
            if(c === 0xA5 && isLocked) { alert("⚠️ 禁断保护：体内含圣水，禁止放气汪！"); return; }
            if(chars.w) await chars.w.writeValue(new Uint8Array([0xFF, c, d]));
            if(c === 0xA3 && d === 0) { isLocked = true; document.getElementById('btn-def').classList.add('btn-lock'); }
            if(c === 0xA2) alert("点动充气指令已发送汪！");
        }

        function handleCmd(e) {
            if(e.key !== 'Enter') return;
            let c = document.getElementById('cmd-in').value; document.getElementById('cmd-in').value = '';
            document.getElementById('cmd-log').innerText = "> 指令已执行: " + c;
            alert("香喏报告：指令 [" + c + "] 已完美送达汪！");
        }

        function startLab(s) { alert("剧本 [" + s + "] 已载入！请确保设备连接汪！"); }

        async function bt(t) {
            // ...连接成功后汪
            document.getElementById('st-' + t[0]).classList.add('st-on');
            alert(t + " 连接成功！汪汪！");
        }
    </script>
</body>
</html>
