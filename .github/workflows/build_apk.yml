name: "体感指挥棒终极暴杀 6.0"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "1. 叼回灵魂代码"
        uses: actions/checkout@v4
        with:
          path: 'soul_code'

      - name: "2. 环境配置"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "3. 设置 Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "4. 初始化骨架"
        run: |
          flutter create --project-name=universal_controller_app . --platforms android --overwrite
          rm -rf lib
          cp -r soul_code/lib .
          cp soul_code/pubspec.yaml .

      - name: "5. 全屏暴力大修复 (香喏的暴走！汪！)"
        run: |
          # 这一步会递归搜索所有 build.gradle，强行注入版本配置，管它本体还是插件汪！
          find . -name "build.gradle" -exec sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' {} +
          find . -name "build.gradle" -exec sed -i 's/minSdkVersion .*/minSdkVersion 21/g' {} +
          # 补齐 App 中文名
          sed -i 's/android:label="universal_controller_app"/android:label="体感指挥棒汪！"/g' android/app/src/main/AndroidManifest.xml

      - name: "6. 焊接最终 Release APK"
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: "7. 胜利交付"
        uses: actions/upload-artifact@v4
        with:
          name: "体感指挥棒_终极版_香喏为您拼命叼回"
          path: build/app/outputs/flutter-apk/app-release.apk
