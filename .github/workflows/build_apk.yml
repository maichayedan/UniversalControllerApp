name: "体感指挥棒终极通关 9.0"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "环境准备"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "Flutter 降临"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "彻底清场与重塑地基 (9.0 必胜版)"
        run: |
          rm -rf ./*
          flutter create --project-name=universal_controller_app --platforms android --overwrite

      - name: "叼回灵魂代码"
        uses: actions/checkout@v4
        with:
          path: 'soul_code'

      - name: "灵魂代码精准回填"
        run: |
          cp -r soul_code/lib .
          cp soul_code/pubspec.yaml .
          # 改个名字
          sed -i 's/android:label="universal_controller_app"/android:label="体感指挥棒9.0" /g' android/app/src/main/AndroidManifest.xml

      - name: "焊接 Release APK"
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: "胜利交付"
        uses: actions/upload-artifact@v4
        with:
          name: "UniversalController_9.0_Victory"
          path: build/app/outputs/flutter-apk/app-release.apk
