name: "体感指挥棒涅槃重生 8.0"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "1. 叼回灵魂代码"
        uses: actions/checkout@v4
        with:
          path: 'soul_code'

      - name: "2. 环境配置"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "3. 设置 Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "4. 全自动骨架补完 (涅槃版)"
        run: |
          # 这一次香喏直接用最土但最稳的方法，让 Flutter 自己把地基打好汪
          flutter create --project-name=universal_controller_app . --platforms android --overwrite
          
          # 这一步最关键！在一切开始前，强制指定一个万能的版本号配置汪
          cat <<EOF > android/build.gradle
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                          buildToolsVersion '34.0.0'
                      }
                  }
              }
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: "5. 灵魂精准归位"
        run: |
          rm -rf lib
          cp -r soul_code/lib .
          cp soul_code/pubspec.yaml .
          # 给 App 穿上漂亮的中文外衣汪
          sed -i 's/android:label="universal_controller_app"/android:label="体感指挥棒汪！"/g' android/app/src/main/AndroidManifest.xml

      - name: "6. 焊接 Release APK"
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: "7. 胜利交付"
        uses: actions/upload-artifact@v4
        with:
          name: "体感指挥棒_涅槃重生版_香喏送达"
          path: build/app/outputs/flutter-apk/app-release.apk
