name: "Sensation棒 Build 15.0"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "1. Checkout Soul Code"
        uses: actions/checkout@v4
        with:
          path: 'soul_code'

      - name: "2. Setup Java Environment"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "3. Setup Flutter Environment"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "4. Create Clean Project Skeleton"
        run: |
          # 使用最纯净的英文名，绝不带任何特殊字符汪
          flutter create --project-name=sens_controller . --platforms android --overwrite
          rm -rf lib
          cp -r soul_code/lib .
          cp soul_code/pubspec.yaml .

      - name: "5. Force Android SDK 34 (Ultimate Fix)"
        run: |
          # 这一次我们直接修改全局环境变量汪！
          flutter config --android-sdk /usr/local/lib/android/sdk
          # 暴力强制所有 Gradle 模块使用 SDK 34 汪
          find . -name "build.gradle" -exec sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' {} +

      - name: "6. Build Release APK"
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: "7. Victory Delivery"
        uses: actions/upload-artifact@v4
        with:
          name: "Sens_Controller_Final_Build"
          path: build/app/outputs/flutter-apk/app-release.apk
