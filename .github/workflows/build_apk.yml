name: "体感指挥官最终必胜打包"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "1. 叼回灵魂代码"
        uses: actions/checkout@v4
        with:
          path: 'soul_code'

      - name: "2. 环境配置"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "3. 设置 Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "4. 纯净重塑骨架"
        run: |
          # 建立一个完全干净的标准 Flutter 骨架
          flutter create --project-name=sens_app . --platforms android --overwrite
          rm -rf lib && cp -r soul_code/lib .
          cp soul_code/pubspec.yaml .
          # 把手机桌面名字改成中文汪！
          sed -i 's/android:label="sens_app"/android:label="体感指挥官汪！"/g' android/app/src/main/AndroidManifest.xml

      - name: "5. 全域强力降服插件"
        run: |
          flutter pub get
          # 焊死版本号，不准插件乱跳汪！
          find . -name "build.gradle" -exec sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' {} +

      - name: "6. 焊接最终 Release APK"
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: "7. 胜利叼回"
        uses: actions/upload-artifact@v4
        with:
          name: "体感指挥官_最终版_请主人查收"
          path: build/app/outputs/flutter-apk/app-release.apk
