name: "体感指挥棒降维打击 7.0"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "1. 叼回灵魂代码"
        uses: actions/checkout@v4
        with:
          path: 'soul_code'

      - name: "2. 环境配置"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "3. 设置 Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "4. 初始化骨架并拉取依赖 (第一波打击)"
        run: |
          flutter create --project-name=universal_controller_app . --platforms android --overwrite
          rm -rf lib
          cp -r soul_code/lib .
          cp soul_code/pubspec.yaml .
          flutter pub get

      - name: "5. 全域版本号注入 (降维打击！汪！)"
        run: |
          # 这一次我们直接修改全局配置，让所有插件都强制使用主项目的版本号汪！
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          if (namespace == null) {
                              namespace project.group
                          }
                          compileSdkVersion 34
                          buildToolsVersion '34.0.0'
                          defaultConfig {
                              minSdkVersion 21
                              targetSdkVersion 34
                          }
                      }
                  }
              }
          }" >> android/build.gradle
          
          # 补齐 App 中文名
          sed -i 's/android:label="universal_controller_app"/android:label="体感指挥棒汪！"/g' android/app/src/main/AndroidManifest.xml

      - name: "6. 焊接最终 Release APK"
        run: |
          # 强制清理并构建汪
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: "7. 胜利交付"
        uses: actions/upload-artifact@v4
        with:
          name: "体感指挥棒_最终版本_香喏为您拼命叼回"
          path: build/app/outputs/flutter-apk/app-release.apk
