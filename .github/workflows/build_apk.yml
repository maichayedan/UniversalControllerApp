name: "体感指挥棒最终版 11.0"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "1. 叼回逻辑"
        uses: actions/checkout@v4
        with:
          path: 'soul_code'

      - name: "2. 配置环境"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "3. 开启 Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "4. 纯净重塑 (11.0 必胜)"
        run: |
          # 内部工程名用纯英文汪
          flutter create --project-name=sens_app . --platforms android --overwrite
          
      - name: "5. 注入灵魂代码"
        run: |
          rm -rf lib
          cp -r soul_code/lib .
          cp soul_code/pubspec.yaml .
          # 把手机屏幕上的名字改成中文汪！
          sed -i 's/android:label="sens_app"/android:label="体感指挥棒汪！"/g' android/app/src/main/AndroidManifest.xml

      - name: "6. 焊接 APK"
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: "7. 胜利交付"
        uses: actions/upload-artifact@v4
        with:
          name: "体感指挥棒_最终版本_香喏亲送"
          path: build/app/outputs/flutter-apk/app-release.apk
