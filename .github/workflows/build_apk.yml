name: "体感指挥17.0 (Ultimate Auto-Victory)"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "1. 叼回核心逻辑"
        uses: actions/checkout@v4
        with:
          path: 'soul_code'

      - name: "2. 环境配置"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "3. 设置 Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "4. 纯净重塑 (17.0 必胜)"
        run: |
          # 这一次我们只创建一个干净的源码工程
          flutter create --project-name=sens_controller --platforms android --overwrite .
          rm -rf lib
          cp -r soul_code/lib .
          cp soul_code/pubspec.yaml .
          # 给 App 贴上中文标签
          sed -i 's/android:label="sens控制"/android:label="体感指挥官必胜！"/g' android/app/src/main/AndroidManifest.xml

      - name: "5. 暴力修正 SDK & Gradle (17.0 注入)"
        run: |
          echo "强制注入 17.0 补丁..."
          # 遍历所有 build.gradle 强制修改 SDK 版本
          find . -name "build.gradle" -exec sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/g' {} +
          find . -name "build.gradle" -exec sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/g' {} +
          # 注入 namespace 修复 Gradle 8.0+ 报错
          find android/app -name "build.gradle" -exec sed -i '/android {/a \    namespace "com.example.sens_controller"' {} +

      - name: "6. Get Dependencies"
        run: flutter pub get

      - name: "7. Build APK"
        run: flutter build apk --release

      - name: "8. Upload APK"
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
