name: "体感指挥棒归真版 10.0"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "1. 叼回核心逻辑"
        uses: actions/checkout@v4
        with:
          path: 'soul_code'

      - name: "2. 环境配置"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "3. 设置 Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "4. 纯净重塑 (10.0 必胜)"
        run: |
          # 这一次我们只创建一个干净的默认工程名汪
          flutter create --project-name=sens棒 . --platforms android --overwrite
          
      - name: "5. 注入灵魂与中文名"
        run: |
          rm -rf lib
          cp -r soul_code/lib .
          cp soul_code/pubspec.yaml .
          # 给 App 贴上中文标签汪
          sed -i 's/android:label="sens棒"/android:label="体感指挥棒汪！"/g' android/app/src/main/AndroidManifest.xml

      - name: "6. 焊接最终 Release APK"
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: "7. 胜利交付"
        uses: actions/upload-artifact@v4
        with:
          name: "体感指挥棒_一键通关版_香喏送达"
          path: build/app/outputs/flutter-apk/app-release.apk
