name: "SensationµŻÆ Build 15.0"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:name: "SensationµŻÆ Build 16.0 (Ultimate Auto-Fix)"

    on:
      push:
          branches: [ "main", "master" ]
            workflow_dispatch:

            jobs:
              build:
                  runs-on: ubuntu-latest

                      steps:
                            - name: "1. Checkout Soul Code"
                                    uses: actions/checkout@v4
                                            with:
                                                      path: 'soul_code'

                                                            - name: "2. Setup Java Environment"
                                                                    uses: actions/setup-java@v4
                                                                            with:
                                                                                      distribution: 'zulu'
                                                                                                java-version: '17'

                                                                                                      - name: "3. Setup Flutter Environment"
                                                                                                              uses: subosito/flutter-action@v2
                                                                                                                      with:
                                                                                                                                flutter-version: '3.19.0'
                                                                                                                                          channel: 'stable'
                                                                                                                                          
                                                                                                                                                - name: "4. Create Clean Project Skeleton"
                                                                                                                                                        run: |
                                                                                                                                                                  flutter create --project-name=sens_controller --platforms android --overwrite .
                                                                                                                                                                            rm -rf lib
                                                                                                                                                                                      cp -r soul_code/lib .
                                                                                                                                                                                                cp soul_code/pubspec.yaml .
                                                                                                                                                                                                
                                                                                                                                                                                                      - name: "5. Brute Force Fix Gradle & SDK 34 (Fix 16.0)"
                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                        echo "Starting Brute Force Fix 16.0..."
                                                                                                                                                                                                                                  # 1. µÜ┤ÕŖøõ┐«µö╣µēĆµ£ē build.gradle ńÜä SDK ńēłµ£¼
                                                                                                                                                                                                                                            find . -name "build.gradle" -exec sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/g' {} +
                                                                                                                                                                                                                                                      find . -name "build.gradle" -exec sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/g' {} +
                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                          # 2. µ│©Õģź namespace ķś▓µŁó Gradle 8.0+ µŖźķöÖ (ķĆÜńö©ÕŹĀõĮŹń¼”)
                                                                                                                                                                                                                                                                                    find android/app -name "build.gradle" -exec sed -i '/android {/a \\    namespace "com.example.sens_controller"' {} +
                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                        # 3. õ┐«ÕżŹ Gradle JVM ÕĀåµĀłķŚ«ķóś
                                                                                                                                                                                                                                                                                                                  mkdir -p android
                                                                                                                                                                                                                                                                                                                            echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                flutter config --android-sdk /usr/local/lib/android/sdk
                                                                                                                                                                                                                                                                                                                                                          yes | flutter doctor --android-licenses
                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                - name: "6. Get Dependencies"
                                                                                                                                                                                                                                                                                                                                                                        run: flutter pub get
                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                              - name: "7. Build APK"
                                                                                                                                                                                                                                                                                                                                                                                      run: flutter build apk --release
                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                            - name: "8. Upload APK"
                                                                                                                                                                                                                                                                                                                                                                                                    uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                            with:
                                                                                                                                                                                                                                                                                                                                                                                                                      name: release-apk
                                                                                                                                                                                                                                                                                                                                                                                                                                path: build/app/outputs/flutter-apk/*.apk
                                                                                                                                                                                                                                                                                                                                                                                                                                
      - name: "1. Checkout Soul Code"
        uses: actions/checkout@v4
        with:
          path: 'soul_code'

      - name: "2. Setup Java Environment"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "3. Setup Flutter Environment"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "4. Create Clean Project Skeleton"
        run: |
          # õĮ┐ńö©µ£Ćń║»ÕćĆńÜäĶŗ▒µ¢ćÕÉŹ’╝īń╗ØõĖŹÕĖ”õ╗╗õĮĢńē╣µ«ŖÕŁŚń¼”µ▒¬
          flutter create --project-name=sens_controller . --platforms android --overwrite
          rm -rf lib
          cp -r soul_code/lib .
          cp soul_code/pubspec.yaml .

      - name: "5. Force Android SDK 34 (Ultimate Fix)"
        run: |
          # Ķ┐ÖõĖĆµ¼Īµłæõ╗¼ńø┤µÄźõ┐«µö╣Õģ©Õ▒ĆńÄ»ÕóāÕÅśķćÅµ▒¬’╝ü
          flutter config --android-sdk /usr/local/lib/android/sdk
          # µÜ┤ÕŖøÕ╝║ÕłČµēĆµ£ē Gradle µ©ĪÕØŚõĮ┐ńö© SDK 34 µ▒¬
          find . -name "build.gradle" -exec sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' {} +

      - name: "6. Build Release APK"
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: "7. Victory Delivery"
        uses: actions/upload-artifact@v4
        with:
          name: "Sens_Controller_Final_Build"
          path: build/app/outputs/flutter-apk/app-release.apk
